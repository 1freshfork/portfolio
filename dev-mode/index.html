<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>freshfork@workpc:~$ </title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Обнуляем стили, чтобы ничего не вылезало наружу */
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Главный контейнер — центрирует строго текущий контент */
        #page-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* --- Карточка профиля --- */
        .about {
            background: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 0.5);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 380px;
            width: 100%;
            z-index: 6;
            margin-bottom: 20px;
        }

        /* Контейнер аватарки */
        .avatar-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            border: 2px solid #58a6ff;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #161b22;
        }

        .about img.logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about h1 {
            font-size: 2rem;
            margin: 10px 0 5px 0;
            color: #ffffff;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .about p {
            color: #8b949e;
            font-size: 1.1rem;
            margin: 0 0 25px 0;
        }

        /* Кнопки соцсетей */
        .social {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            background-color: #1f242c;
            border: 1px solid #30363d;
            border-radius: 14px;
            transition: all 0.2s ease;
        }

        .social a:hover {
            background-color: #30363d;
            transform: translateY(-4px);
            border-color: #58a6ff;
            box-shadow: 0 5px 15px rgba(88, 166, 255, 0.2);
        }

        .social img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* --- Идеальный плеер в один ряд --- */
        .music {
            background: rgba(22, 27, 34, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(48, 54, 61, 0.5);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            z-index: 6;
        }

        /* Чистая кнопка без синих браузерных кругов и рамок */
        .music .button {
            cursor: pointer;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            outline: none;
            padding: 0;
            transition: opacity 0.2s ease, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }

        .music .button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .music .button .material-symbols-outlined {
            font-size: 40px;
        }

        /* Моноширинные тайм-коды */
        .time-display {
            font-size: 0.85rem;
            color: #8b949e;
            width: 45px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        /* Ползунок прогресса */
        .progress-container {
            flex-grow: 1;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            border-radius: 3px;
            position: absolute;
            left: 0;
            top: 0;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        /* --- Огромный нижний прогресс-бар --- */
        .bottom-progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            z-index: 10;
            transition: height 0.2s ease;
        }

        .bottom-progress-container:hover {
            height: 12px;
        }

        .bottom-progress-bar {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            box-shadow: 0 -2px 10px rgba(255, 255, 255, 0.4);
        }

        /* Живой фон (Видео) */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
        }

        .animated-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="page-wrapper">
        
        <div class="about">
            <div class="avatar-container">
                <img src="files/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';">
            </div>
            <h1>FreshFork</h1>
            <p>Full-Stack developer</p>
            
            <div class="social">
                <a href="https://t.me/freshfork" target="_blank"><img src="files/Telegram_logo.webp" alt="TG"></a>
                <a href="https://vk.ru/freshfork" target="_blank"><img src="files/VK_Logo.png" alt="VK"></a>
                <a href="https://www.donationalerts.com/r/freshfork" target="_blank"><img src="files/da_logo.png" alt="DA"></a>
            </div>
        </div>

        <div class="music">
            <button class="button" id="audioBtn">
                <span class="material-symbols-outlined" id="playIcon">play_circle</span>
            </button>
            
            <div class="time-display" id="currentTime">0:00</div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="time-display" id="durationTime">-:--</div>
        </div>

        <div class="bottom-progress-container" id="bottomProgressContainer">
            <div class="bottom-progress-bar" id="bottomProgressBar"></div>
        </div>

        <div class="animated-background">
            <video id="myVideo" autoplay loop muted playsinline>
                <source src="files/1_1.mp4#t=1" type="video/mp4">
            </video>
        </div>

        <audio id="myAudio" src="files/music.mp3"></audio>

    </div>

    <script>
        const video = document.getElementById('myVideo');
        const audio = document.getElementById('myAudio');
        const audioBtn = document.getElementById('audioBtn');
        const playIcon = document.getElementById('playIcon');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const bottomProgressBar = document.getElementById('bottomProgressBar');
        const bottomProgressContainer = document.getElementById('bottomProgressContainer');

        // Логика зацикливания видео-фона без микрофризов
        video.addEventListener('loadedmetadata', () => {
            const stopTime = video.duration - 1;
            video.addEventListener('timeupdate', () => {
                if (video.currentTime >= stopTime) {
                    video.pause();
                    video.currentTime = stopTime;
                }
            });
        });

        // Форматирование времени в 0:00
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Подгрузка длительности трека
        if (audio.readyState >= 1) {
            durationTimeEl.textContent = formatTime(audio.duration);
        } else {
            audio.addEventListener('loadedmetadata', () => {
                durationTimeEl.textContent = formatTime(audio.duration);
            });
        }

        // Функция запуска музыки
        function playTrack() {
            audio.play()
                .then(() => {
                    playIcon.textContent = 'stop_circle';
                })
                .catch(err => {
                    console.log("Браузер заблокировал звук, ждём активности.");
                });
        }

        // Автозапуск по движению мыши или клику
        function autoPlayHandler() {
            playTrack();
            window.removeEventListener('mousemove', autoPlayHandler);
            window.removeEventListener('click', autoPlayHandler);
            window.removeEventListener('keydown', autoPlayHandler);
        }

        window.addEventListener('mousemove', autoPlayHandler);
        window.addEventListener('click', autoPlayHandler);
        window.addEventListener('keydown', autoPlayHandler);

        // Ручной клик по кнопке Play/Stop
        audioBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.paused) {
                playTrack();
            } else {
                audio.pause();
                playIcon.textContent = 'play_circle';
            }
        });

        // Синхронное обновление обоих баров и таймеров
        audio.addEventListener('timeupdate', () => {
            const percentage = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percentage + '%';
            bottomProgressBar.style.width = percentage + '%';

            currentTimeEl.textContent = formatTime(audio.currentTime);
            if (audio.duration) {
                const timeLeft = audio.duration - audio.currentTime;
                durationTimeEl.textContent = '-' + formatTime(timeLeft);
            }
        });

        // Функция для ручной перемотки трека
        function setTrackPosition(element, clickEvent) {
            const width = element.clientWidth;
            const clickX = clickEvent.offsetX;
            const duration = audio.duration;
            if (duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        }

        progressContainer.addEventListener('click', (e) => setTrackPosition(progressContainer, e));
        bottomProgressContainer.addEventListener('click', (e) => setTrackPosition(bottomProgressContainer, e));

        // Сброс при окончании трека
        audio.addEventListener('ended', () => {
            playIcon.textContent = 'play_circle';
            progressBar.style.width = '0%';
            bottomProgressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            durationTimeEl.textContent = formatTime(audio.duration);
        });
    </script>
</body>
</html>
